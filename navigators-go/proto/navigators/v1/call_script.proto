syntax = "proto3";

package navigators.v1;

option go_package = "navigators-go/gen/go/navigators/v1;navigatorsv1";

// CallScriptService manages admin CRUD for call scripts.
// Note: Navigators READ call scripts via SyncService.PullCallScripts + local
// Drift cache. This service is for ADMIN mutations only (plus an optional
// admin-facing live ListCallScripts for management UI).
service CallScriptService {
  // CreateCallScript creates a new call script (admin).
  rpc CreateCallScript(CreateCallScriptRequest) returns (CreateCallScriptResponse);

  // UpdateCallScript updates a call script's title/content/active state (admin).
  rpc UpdateCallScript(UpdateCallScriptRequest) returns (UpdateCallScriptResponse);

  // DeactivateCallScript soft-deletes a call script (sets is_active=false) (admin).
  // Pull-sync propagates the deactivation to clients.
  rpc DeactivateCallScript(DeactivateCallScriptRequest) returns (DeactivateCallScriptResponse);

  // ListCallScripts returns all call scripts for the company (admin management view).
  rpc ListCallScripts(ListCallScriptsRequest) returns (ListCallScriptsResponse);
}

message CallScript {
  string id = 1;
  string company_id = 2;
  string title = 3;
  string content = 4;
  int32 version = 5;
  bool is_active = 6;
  string created_at = 7;
  string updated_at = 8;
}

message CreateCallScriptRequest {
  string title = 1;
  string content = 2;
}

message CreateCallScriptResponse {
  CallScript script = 1;
}

message UpdateCallScriptRequest {
  string id = 1;
  string title = 2;
  string content = 3;
  bool is_active = 4;
}

message UpdateCallScriptResponse {
  CallScript script = 1;
}

message DeactivateCallScriptRequest {
  string id = 1;
}

message DeactivateCallScriptResponse {}

message ListCallScriptsRequest {
  bool include_inactive = 1;
}

message ListCallScriptsResponse {
  repeated CallScript scripts = 1;
}
