syntax = "proto3";

package navigators.v1;

option go_package = "navigators-go/gen/go/navigators/v1;navigatorsv1";

// OnboardingService manages navigator onboarding flow.
service OnboardingService {
  // GetOnboardingStatus returns the navigator's profile and onboarding completion status.
  rpc GetOnboardingStatus(GetOnboardingStatusRequest) returns (GetOnboardingStatusResponse);

  // AcknowledgeLegal records a legal acknowledgment with a version string.
  rpc AcknowledgeLegal(AcknowledgeLegalRequest) returns (AcknowledgeLegalResponse);

  // CompleteOnboarding marks onboarding as complete, gating app access.
  rpc CompleteOnboarding(CompleteOnboardingRequest) returns (CompleteOnboardingResponse);

  // UpdateLeaderboardOptIn toggles leaderboard participation for the navigator.
  rpc UpdateLeaderboardOptIn(UpdateLeaderboardOptInRequest) returns (UpdateLeaderboardOptInResponse);
}

// LeaderboardService provides aggregated volunteer performance metrics.
service LeaderboardService {
  // GetLeaderboard returns ranked opted-in users with aggregated metrics.
  rpc GetLeaderboard(GetLeaderboardRequest) returns (GetLeaderboardResponse);
}

// TrainingService manages training materials backed by MinIO storage.
service TrainingService {
  // ListTrainingMaterials returns published training materials.
  rpc ListTrainingMaterials(ListTrainingMaterialsRequest) returns (ListTrainingMaterialsResponse);

  // CreateTrainingMaterial creates a new training material entry.
  rpc CreateTrainingMaterial(CreateTrainingMaterialRequest) returns (CreateTrainingMaterialResponse);

  // GetTrainingDownloadUrl returns a presigned download URL for a training material.
  rpc GetTrainingDownloadUrl(GetTrainingDownloadUrlRequest) returns (GetTrainingDownloadUrlResponse);
}

// --- Messages ---

message NavigatorProfile {
  string user_id = 1;
  string company_id = 2;
  string onboarding_completed_at = 3;   // ISO timestamp, empty if not completed
  string legal_acknowledgment_at = 4;    // ISO timestamp, empty if not acknowledged
  string legal_acknowledgment_version = 5;
  bool leaderboard_opt_in = 6;
  string created_at = 7;
  string updated_at = 8;
}

// --- OnboardingService ---

message GetOnboardingStatusRequest {}

message GetOnboardingStatusResponse {
  NavigatorProfile profile = 1;
  bool onboarding_complete = 2;
}

message AcknowledgeLegalRequest {
  string version = 1; // Legal document version string (e.g., "tos-v1.2")
}

message AcknowledgeLegalResponse {}

message CompleteOnboardingRequest {}

message CompleteOnboardingResponse {
  NavigatorProfile profile = 1;
}

message UpdateLeaderboardOptInRequest {
  bool opt_in = 1;
}

message UpdateLeaderboardOptInResponse {}

// --- LeaderboardService ---

message LeaderboardEntry {
  string user_id = 1;
  string display_name = 2;
  int32 doors_knocked = 3;
  int32 texts_sent = 4;
  int32 calls_made = 5;
  int32 total_actions = 6;
  int32 events_attended = 7;
}

message GetLeaderboardRequest {
  string time_window = 1; // "week", "month", "all_time"
}

message GetLeaderboardResponse {
  repeated LeaderboardEntry entries = 1;
}

// --- TrainingService ---

message TrainingMaterial {
  string id = 1;
  string title = 2;
  string description = 3;
  string content_url = 4;
  int32 sort_order = 5;
  bool is_published = 6;
  string created_at = 7;
}

message ListTrainingMaterialsRequest {}

message ListTrainingMaterialsResponse {
  repeated TrainingMaterial materials = 1;
}

message CreateTrainingMaterialRequest {
  string title = 1;
  string description = 2;
  string content_url = 3;
  int32 sort_order = 4;
}

message CreateTrainingMaterialResponse {
  TrainingMaterial material = 1;
}

message GetTrainingDownloadUrlRequest {
  string material_id = 1;
}

message GetTrainingDownloadUrlResponse {
  string presigned_url = 1;
}
