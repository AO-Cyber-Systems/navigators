syntax = "proto3";

package navigators.v1;

option go_package = "navigators-go/gen/go/navigators/v1;navigatorsv1";

// SyncService handles offline data synchronization between Flutter client and server.
service SyncService {
  // PullVoterUpdates returns voters updated since the given cursor, scoped to turfs.
  rpc PullVoterUpdates(PullVoterUpdatesRequest) returns (PullVoterUpdatesResponse);

  // PullContactLogs returns contact logs updated since the given cursor, scoped to turfs.
  rpc PullContactLogs(PullContactLogsRequest) returns (PullContactLogsResponse);

  // PushSyncBatch receives a batch of operations from the client outbox.
  rpc PushSyncBatch(PushSyncBatchRequest) returns (PushSyncBatchResponse);

  // PullSurveyForms returns active survey forms updated since the given cursor.
  rpc PullSurveyForms(PullSurveyFormsRequest) returns (PullSurveyFormsResponse);

  // PullSurveyResponses returns survey responses created since the given cursor, scoped to turfs.
  rpc PullSurveyResponses(PullSurveyResponsesRequest) returns (PullSurveyResponsesResponse);

  // PullVoterNotes returns voter notes created since the given cursor, scoped to turfs and role.
  rpc PullVoterNotes(PullVoterNotesRequest) returns (PullVoterNotesResponse);

  // PullCallScripts returns call scripts updated since the given cursor.
  rpc PullCallScripts(PullCallScriptsRequest) returns (PullCallScriptsResponse);

  // PullTasks returns tasks and their assignments updated since the given cursor.
  rpc PullTasks(PullTasksRequest) returns (PullTasksResponse);

  // PullTaskNotes returns task notes created since the given cursor.
  rpc PullTaskNotes(PullTaskNotesRequest) returns (PullTaskNotesResponse);

  // GetSyncManifest returns the user's turf assignments with metadata for initial sync.
  rpc GetSyncManifest(GetSyncManifestRequest) returns (GetSyncManifestResponse);

  // PullEvents returns events and RSVPs updated since the given cursor.
  rpc PullEvents(PullEventsRequest) returns (PullEventsResponse);

  // PullTrainingMaterials returns published training materials updated since the given cursor.
  rpc PullTrainingMaterials(PullTrainingMaterialsRequest) returns (PullTrainingMaterialsResponse);
}

// --- Pull Voters ---

message PullVoterUpdatesRequest {
  string since_cursor = 1;      // ISO timestamp or empty for full sync
  repeated string turf_ids = 2; // Scoped to assigned turfs
  int32 batch_size = 3;         // Max voters per response (default 500)
}

message PullVoterUpdatesResponse {
  repeated SyncVoter voters = 1;
  string next_cursor = 2;       // Use as since_cursor in next call
  bool has_more = 3;            // More pages available
}

// SyncVoter contains all voter fields needed for local cache.
message SyncVoter {
  string id = 1;
  string turf_id = 2;
  string first_name = 3;
  string last_name = 4;
  string middle_name = 5;
  string suffix = 6;
  int32 year_of_birth = 7;
  string res_street_address = 8;
  string res_city = 9;
  string res_state = 10;
  string res_zip = 11;
  string party = 12;
  string status = 13;
  double latitude = 14;
  double longitude = 15;
  string voting_history = 16;
  string phone = 17;
  string email = 18;
  int32 walk_sequence = 19;
  string server_updated_at = 20; // ISO timestamp
}

// --- Pull Contact Logs ---

message PullContactLogsRequest {
  string since_cursor = 1;
  repeated string turf_ids = 2;
  int32 batch_size = 3;
}

message PullContactLogsResponse {
  repeated SyncContactLog contact_logs = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

// SyncContactLog contains all contact log fields for local cache.
message SyncContactLog {
  string id = 1;
  string voter_id = 2;
  string turf_id = 3;
  string user_id = 4;
  string contact_type = 5;
  string outcome = 6;
  string notes = 7;
  string created_at = 8; // ISO timestamp
  string door_status = 9;
  int32 sentiment = 10; // 0 means null/unset, 1-5 valid range
}

// --- Push Sync Batch ---

message PushSyncBatchRequest {
  repeated SyncOperation operations = 1;
}

message PushSyncBatchResponse {
  repeated string processed_operation_ids = 1; // Client UUIDs that succeeded
  repeated SyncError errors = 2;               // Failures with reasons
}

message SyncOperation {
  string client_operation_id = 1;
  string entity_type = 2;
  string entity_id = 3;
  string operation_type = 4; // create, update, delete
  bytes payload = 5;         // JSON-encoded operation data
  string client_timestamp = 6;
}

message SyncError {
  string operation_id = 1;
  string code = 2;
  string message = 3;
}

// --- Get Sync Manifest ---

message GetSyncManifestRequest {}

message GetSyncManifestResponse {
  repeated TurfAssignmentInfo turf_assignments = 1;
  string server_time = 2; // ISO timestamp
}

message TurfAssignmentInfo {
  string turf_id = 1;
  string turf_name = 2;
  string boundary_geojson = 3;
  int32 voter_count = 4;
}

// --- Pull Survey Forms ---

message PullSurveyFormsRequest {
  string since_cursor = 1;
  int32 batch_size = 2;
}

message PullSurveyFormsResponse {
  repeated SyncSurveyForm survey_forms = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message SyncSurveyForm {
  string id = 1;
  string company_id = 2;
  string title = 3;
  string description = 4;
  string schema = 5;      // JSON string of form definition
  int32 version = 6;
  bool is_active = 7;
  string created_at = 8;
  string updated_at = 9;
}

// --- Pull Survey Responses ---

message PullSurveyResponsesRequest {
  string since_cursor = 1;
  repeated string turf_ids = 2;
  int32 batch_size = 3;
}

message PullSurveyResponsesResponse {
  repeated SyncSurveyResponse survey_responses = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message SyncSurveyResponse {
  string id = 1;
  string form_id = 2;
  int32 form_version = 3;
  string voter_id = 4;
  string user_id = 5;
  string turf_id = 6;
  string contact_log_id = 7;
  string responses = 8;   // JSON string
  string created_at = 9;
}

// --- Pull Voter Notes ---

message PullVoterNotesRequest {
  string since_cursor = 1;
  repeated string turf_ids = 2;
  int32 batch_size = 3;
}

message PullVoterNotesResponse {
  repeated SyncVoterNote voter_notes = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message SyncVoterNote {
  string id = 1;
  string voter_id = 2;
  string user_id = 3;
  string turf_id = 4;
  string content = 5;
  string visibility = 6;  // private, team, org
  string created_at = 7;
  string updated_at = 8;
}

// --- Pull Call Scripts ---

message PullCallScriptsRequest {
  string since_cursor = 1;
  int32 batch_size = 2;
}

message PullCallScriptsResponse {
  repeated SyncCallScript call_scripts = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message SyncCallScript {
  string id = 1;
  string company_id = 2;
  string title = 3;
  string content = 4;
  int32 version = 5;
  bool is_active = 6;
  string created_at = 7;
  string updated_at = 8;
}

// --- Pull Tasks ---

message PullTasksRequest {
  string since_cursor = 1;
  int32 batch_size = 2;
}

message PullTasksResponse {
  repeated SyncTask tasks = 1;
  repeated SyncTaskAssignment task_assignments = 2;
  string next_cursor = 3;
  bool has_more = 4;
}

message SyncTask {
  string id = 1;
  string company_id = 2;
  string title = 3;
  string description = 4;
  string task_type = 5;
  string priority = 6;
  string status = 7;
  string due_date = 8;
  string linked_entity_type = 9;
  string linked_entity_id = 10;
  int32 progress_pct = 11;
  int32 total_count = 12;
  int32 completed_count = 13;
  string created_by = 14;
  string created_at = 15;
  string updated_at = 16;
}

message SyncTaskAssignment {
  string id = 1;
  string task_id = 2;
  string user_id = 3;
  string assigned_by = 4;
  string assigned_at = 5;
}

// --- Pull Task Notes ---

message PullTaskNotesRequest {
  string since_cursor = 1;
  int32 batch_size = 2;
}

message PullTaskNotesResponse {
  repeated SyncTaskNote task_notes = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message SyncTaskNote {
  string id = 1;
  string company_id = 2;
  string task_id = 3;
  string user_id = 4;
  string content = 5;
  string visibility = 6;
  string created_at = 7;
}

// --- Pull Events ---

message PullEventsRequest {
  string since_cursor = 1;
  int32 batch_size = 2;
}

message PullEventsResponse {
  repeated SyncEvent events = 1;
  repeated SyncEventRSVP rsvps = 2;
  string next_cursor = 3;
  bool has_more = 4;
}

message SyncEvent {
  string id = 1;
  string company_id = 2;
  string title = 3;
  string description = 4;
  string event_type = 5;
  string status = 6;
  string starts_at = 7;
  string ends_at = 8;
  string location_name = 9;
  double location_lat = 10;
  double location_lng = 11;
  string linked_turf_id = 12;
  int32 max_attendees = 13;
  string created_by = 14;
  string created_at = 15;
  string updated_at = 16;
}

message SyncEventRSVP {
  string id = 1;
  string event_id = 2;
  string user_id = 3;
  string status = 4;
  string created_at = 5;
}

// --- Pull Training Materials ---

message PullTrainingMaterialsRequest {
  string since_cursor = 1;
  int32 batch_size = 2;
}

message PullTrainingMaterialsResponse {
  repeated SyncTrainingMaterial materials = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message SyncTrainingMaterial {
  string id = 1;
  string company_id = 2;
  string title = 3;
  string description = 4;
  string content_url = 5;
  int32 sort_order = 6;
  bool is_published = 7;
  string created_at = 8;
  string updated_at = 9;
}
