syntax = "proto3";

package navigators.v1;

option go_package = "navigators-go/gen/go/navigators/v1;navigatorsv1";

// SMSService provides P2P texting, conversation management, and SMS configuration.
service SMSService {
  // SendP2PMessage sends a human-initiated text message to a voter.
  rpc SendP2PMessage(SendP2PMessageRequest) returns (SendP2PMessageResponse);

  // GetConversation returns the message thread for a specific voter.
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);

  // ListConversations returns voter summaries with last message for the conversation list.
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);

  // GetSMSConfig returns the SMS configuration for the company (admin only).
  rpc GetSMSConfig(GetSMSConfigRequest) returns (GetSMSConfigResponse);

  // UpdateSMSConfig updates the SMS configuration for the company (admin only).
  rpc UpdateSMSConfig(UpdateSMSConfigRequest) returns (UpdateSMSConfigResponse);
}

// SMSMessage represents an individual SMS message.
message SMSMessage {
  string id = 1;
  string voter_id = 2;
  string user_id = 3;
  string direction = 4;        // "inbound" or "outbound"
  string message_type = 5;     // "p2p" or "a2p"
  string body = 6;
  string status = 7;           // "queued", "sent", "delivered", "undelivered", "failed", "received"
  string created_at = 8;
  string from_number = 9;
  string to_number = 10;
}

// SMSConfig represents the company SMS configuration.
message SMSConfig {
  string company_id = 1;
  string twilio_account_sid = 2;
  string p2p_messaging_service_sid = 3;
  string a2p_messaging_service_sid = 4;
  string inbound_webhook_url = 5;
  string status_webhook_url = 6;
  int32 quiet_hours_start = 7;
  int32 quiet_hours_end = 8;
  string ten_dlc_brand_sid = 9;
  string ten_dlc_campaign_sid = 10;
  string ten_dlc_status = 11;
}

// ConversationSummary represents a voter's conversation overview.
message ConversationSummary {
  string voter_id = 1;
  string voter_name = 2;
  string last_message_body = 3;
  string last_message_at = 4;
}

// SendP2PMessage
message SendP2PMessageRequest {
  string voter_id = 1;
  string body = 2;
}

message SendP2PMessageResponse {
  SMSMessage message = 1;
}

// GetConversation
message GetConversationRequest {
  string voter_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message GetConversationResponse {
  repeated SMSMessage messages = 1;
  int64 total_count = 2;
  string next_page_token = 3;
}

// ListConversations
message ListConversationsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListConversationsResponse {
  repeated ConversationSummary conversations = 1;
  string next_page_token = 2;
}

// GetSMSConfig
message GetSMSConfigRequest {}

message GetSMSConfigResponse {
  SMSConfig config = 1;
}

// UpdateSMSConfig
message UpdateSMSConfigRequest {
  string twilio_account_sid = 1;
  string twilio_auth_token = 2;
  string p2p_messaging_service_sid = 3;
  string a2p_messaging_service_sid = 4;
  string inbound_webhook_url = 5;
  string status_webhook_url = 6;
  int32 quiet_hours_start = 7;
  int32 quiet_hours_end = 8;
  string ten_dlc_brand_sid = 9;
  string ten_dlc_campaign_sid = 10;
  string ten_dlc_status = 11;
}

message UpdateSMSConfigResponse {
  SMSConfig config = 1;
}
