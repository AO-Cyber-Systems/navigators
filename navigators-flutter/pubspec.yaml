name: navigators
description: "MaineGOP Voter Outreach Platform"
publish_to: none
version: 1.0.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  eden_platform_flutter:
    path: ../../eden-libs/eden-platform-flutter
  eden_ui_flutter:
    path: ../../eden-libs/eden-ui-flutter
  eden_platform_api_dart:
    path: ../../eden-libs/eden-platform-api-dart
  go_router: ^14.0.0
  http: ^1.2.0
  file_picker: ^8.0.0
  intl: ^0.19.0
  flutter_map: ^8.2.2
  flutter_map_marker_cluster: ^8.2.2
  flutter_map_line_editor: ^8.0.0
  flutter_map_dragmarker: ^8.0.0
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^10.1.1
  url_launcher: ^6.3.0
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  connectivity_plus: ^7.1.1
  workmanager: ^0.9.0+3
  path_provider: ^2.1.5
  internet_connection_checker_plus: ^2.9.1+2
  flutter_secure_storage: ^10.0.0
  flutter_local_notifications: ^18.0.1
  fl_chart: ^1.2.0
  share_plus: ^12.0.2
  flutter_markdown: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.13.1

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter:
  uses-material-design: true
