services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: navigators_dev
      POSTGRES_USER: navigators
      POSTGRES_PASSWORD: navigators_dev
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navigators -d navigators_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nats:
    image: nats:2.11-alpine
    command: ["--jetstream"]
    ports:
      - "4222:4222"
      - "8222:8222"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
