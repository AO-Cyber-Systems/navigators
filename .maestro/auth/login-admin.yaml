# Auth: log in as admin
#
# Clears app state and logs in using the seeded admin account
# (admin@mainegop.test / testtest from seed_data.sql). Asserts the
# main shell is reached by waiting for the 'nav-home' nav item.
#
# Override credentials at runtime with:
#   maestro test -e EMAIL=... -e PASSWORD=... .maestro/auth/login-admin.yaml
appId: com.mainegop.navigators
env:
  EMAIL: admin@mainegop.test
  PASSWORD: ${MAESTRO_PW}
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "eden-login-screen"
    timeout: 30000
- tapOn:
    id: "eden-login-email"
- inputText: ${EMAIL}
- tapOn:
    id: "eden-login-password"
- inputText: ${PASSWORD}
- tapOn:
    id: "eden-login-submit"
# First-login path: local DB is fresh, so _onAuthenticated pushes the turf
# download screen. Dismiss it (or download all) so the main shell is reached.
- runFlow:
    when:
      visible:
        id: "turf-download-screen"
    commands:
      - tapOn:
          id: "turf-download-all-btn"
      - extendedWaitUntil:
          visible: "All Downloaded"
          timeout: 60000
      - back
- extendedWaitUntil:
    visible:
      id: "nav-home"
    timeout: 30000
