# Auth: log in as a plain navigator (non-admin)
#
# Clears app state and logs in as nav2@mainegop.test (James Carter, role
# 'navigator' per seed_data.sql). Non-admin so admin-only nav entries like
# 'nav-suppression' / 'nav-import' must NOT be visible on the shell.
appId: com.mainegop.navigators
env:
  EMAIL: nav2@mainegop.test
  PASSWORD: ${MAESTRO_PW}
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "eden-login-screen"
    timeout: 30000
- tapOn:
    id: "eden-login-email"
- inputText: ${EMAIL}
- tapOn:
    id: "eden-login-password"
- inputText: ${PASSWORD}
- tapOn:
    id: "eden-login-submit"
# First-login path: local DB is fresh, so _onAuthenticated pushes the turf
# download screen. Dismiss it (or download all) so the main shell is reached.
- runFlow:
    when:
      visible:
        id: "turf-download-screen"
    commands:
      - tapOn:
          id: "turf-download-all-btn"
      - extendedWaitUntil:
          visible: "All Downloaded"
          timeout: 60000
      - back
- extendedWaitUntil:
    visible:
      id: "nav-home"
    timeout: 30000
