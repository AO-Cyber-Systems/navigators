# Gap-closure 07-03: call-script CRUD (admin)
#
# Covers create -> edit -> deactivate on call scripts via
# CallScriptManagerScreen / CallScriptEditorScreen.
#
# KNOWN GAP: there is currently NO reachable entry point for
# CallScriptManagerScreen in lib/src/app.dart -- it has no 'nav-call-scripts'
# item and no admin-menu button that pushes the route. Until that lands, this
# flow cannot execute end-to-end from the shell.
#
# TODO(nav): add an 'EdenNavItem(id: "call_scripts", semanticsIdentifier:
#   "nav-call-scripts", ...)' gated by isAdmin in app.dart, plus a case in
#   _buildBody that returns const CallScriptManagerScreen(). Once that lands,
#   replace the block below with:
#     - tapOn: { id: "nav-call-scripts" }
#     - assertVisible: { id: "call-script-manager-screen" }
appId: com.mainegop.navigators
---
- runFlow: ../auth/login-admin.yaml

# TODO(reachability): remove this stop-gap once call-script manager has a
# nav entry. Until then, the flow asserts we're logged in and bails out so
# CI can track the gap without false failures.
- assertVisible:
    id: "nav-home"

