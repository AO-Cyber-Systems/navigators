# Gap-closure 10-03: training material upload / edit / delete (admin)
#
# As an admin:
#   1. Open the Training list from the overflow nav
#   2. Tap the FAB to open the upload screen
#   3. Assert the upload screen renders with its file-picker + submit button
#
# NOTE on file picker: `training-upload-file-picker` launches Android's
# Storage Access Framework (com.android.documentsui). That UI is a separate
# package and Maestro's view hierarchy filters by appId by default, so
# driving the SAF end-to-end requires:
#   a) adb push tools/fixtures/maestro-training.pdf /sdcard/Download/
#   b) a secondary flow with documentsui appId to navigate Roots -> Downloads
#      -> maestro-training.pdf
# That infra is a follow-up. Until it lands, this flow validates the path
# up to (but not through) the SAF picker and asserts the submit button is
# visible. Full end-to-end upload is explicitly out of scope here.
appId: com.mainegop.navigators
---
- runFlow: ../auth/login-admin.yaml

# --- 1. Open training list ---------------------------------------------------
- tapOn:
    id: "eden-nav-more"
- tapOn:
    id: "nav-training"
- extendedWaitUntil:
    visible:
      id: "training-list-screen"
    timeout: 30000

# --- 2. Open upload screen ---------------------------------------------------
- tapOn:
    id: "training-list-fab"
- extendedWaitUntil:
    visible:
      id: "training-upload-screen"
    timeout: 15000

# --- 3. Smoke-assert upload UI ----------------------------------------------
- assertVisible:
    id: "training-upload-file-picker"
- assertVisible:
    id: "training-upload-submit"

