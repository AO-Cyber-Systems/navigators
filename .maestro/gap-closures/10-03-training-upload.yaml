# Gap-closure 10-03: training material upload / edit / delete (admin)
#
# As an admin:
#   1. Open the Training list
#   2. Tap the FAB to open the upload screen
#   3. Pick a file (NATIVE SAF dialog -- see TODO), fill metadata, submit
#   4. Confirm the new row appears in the list
#   5. Edit its title via the row overflow menu
#   6. Delete it via the row overflow menu and confirm it's gone
#
# NOTE on file picker: `training-upload-file-picker` launches the platform's
# native Storage Access Framework picker on Android. That picker is a
# separate system UI package (com.android.documentsui) and is NOT visible
# under appId com.mainegop.navigators -- Maestro's view hierarchy filters by
# appId by default. See TODO below.
appId: com.mainegop.navigators
---
- runFlow: ../auth/login-admin.yaml

# --- 1. Open training list ---------------------------------------------------
- tapOn:
    id: "nav-training"
- assertVisible:
    id: "training-list-screen"

# --- 2. Open upload screen ---------------------------------------------------
- tapOn:
    id: "training-list-fab"
- assertVisible:
    id: "training-upload-screen"

# --- 3. Pick a file ----------------------------------------------------------
- tapOn:
    id: "training-upload-file-picker"
# TODO(file-picker): after the tap above, Android shows the system SAF
# picker. To drive it in Maestro we need to:
